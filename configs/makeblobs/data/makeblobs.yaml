dataset:
  name: MakeBlobs
  # Synthetic dataset; no root needed
  n_samples: 1000
  n_features: 10
  centers: [[ 0, -3, -3, -3,  0, -3, -1, -2, -3,  0], [ 1, -1, -1,  0,  0, -1, -2,  1,  0,  0], [2, 1, 2, 2, 1, 1, 2, 1, 2, 2]]
  cluster_std: 1.5
  # center_box: [-10.0, 10.0]
  test_size: 0.2
  standardize: True
  # random_state: null
  num_classes: 3
  input_dim: [1,1,10]
  # For non-image models this should match n_features
  in_channels: 2
  noise: False
  include_teacher: False
